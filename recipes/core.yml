# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
modules:
  - type: systemd
    system:
      masked:
        #- NetworkManager-wait-online.service
        - flatpak-add-fedora-repos.service
        - bootc-fetch-apply-updates.timer
    user:
      enabled:
        - podman.socket

  #- type: script
  #  scripts:
  #    - install-apps.sh

  - type: justfiles
    validate: true
    install: true
    #if include is omitted, all just files in files/justfiles are being included
    #include:
    #  - path/to/justfile.just

  - type: dnf
    install:
      packages:
        #proton vpn is not getting installed by the link below, but it does add the repos. It needs to be in its own module and run first, so the repo is available on the next dnf install command
        # running them together will not work because the module tries to install all at once, which fails due the missing repo from this rpm
        - https://repo.protonvpn.com/fedora-%OS_VERSION%-stable/protonvpn-stable-release/protonvpn-stable-release-1.0.3-1.noarch.rpm

  - type: script
    scripts:
      - install-proton-vpn.sh

  - type: dnf
    repos:
      cleanup: true
      copr:
        - bieszczaders/kernel-cachyos-addons
        - lilay/topgrade
        - principis/howdy-beta
        #- ligenix/cosmic-ext
        #- sneexy/zen-browser
        - lilay/tealdeer
        - atim/starship
        - codifryed/CoolerControl
      files:
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
        - https://repo.vivaldi.com/archive/vivaldi-fedora.repo
        #- https://pkg.cloudflareclient.com/cloudflare-warp-ascii.repo
      keys:
        - https://repo.vivaldi.com/archive/linux_signing_key.pub
        - https://releases.warp.dev/linux/keys/warp.asc
    install:
      packages:
        - fedora-workstation-repositories
        - terra-release
        #- https://gitlab.com/api/v4/projects/79678744/packages/generic/noctua/latest/noctua.fc%OS_VERSION%.x86_64.rpm
        #- cosmic-ext-calculator #completely broken
        #- cosmic-ext-disks
        #- cosmic-ext-applet-clipboard-manager
        #- https://gitlab.com/api/v4/projects/79697288/packages/generic/cosmic-ext-applet-sysinfo/latest/cosmic-ext-applet-sysinfo.fc%OS_VERSION%.x86_64.rpm
        - https://gitlab.com/api/v4/projects/79697895/packages/generic/cosmic-ext-applet-logomenu/latest/cosmic-ext-applet-logomenu.fc%OS_VERSION%.x86_64.rpm
        - https://gitlab.com/api/v4/projects/77221939/packages/generic/origami-update-applet/latest/origami-update-applet.fc%OS_VERSION%.x86_64.rpm
        #- https://gitlab.com/api/v4/projects/76137389/packages/generic/cosmic-initial-setup/latest/cosmic-initial-setup.fc%OS_VERSION%.x86_64.rpm
        #unknown if I need this package
        #- NetworkManager-openvpn-gnome
        - v4l-utils
        - fish
        - lazygit
        #- helix
        - procs
        - du-dust
        #- neovim
        #- python3-neovim
        - zellij
        #- topgrade
        - repo: copr:copr.fedorainfracloud.org:lilay:topgrade
          packages:
            - topgrade
        #- zen-browser
        - rsms-inter-fonts
        #- google-noto-sans-myanmar-fonts
        #- google-noto-serif-myanmar-fonts
        - bibata-cursor-theme
        #- cloudflare-warp
        - lolcat
        #- figlet
        #- cowsay
        - btop
        - fastfetch
        - podman-compose
        #- aria2
        #- cava
        - bat
        - ripgrep
        - zoxide
        - yazi
        - lsd
        - hyperfine
        #- howdy # howdy fails because of dlib
        #- starship
        - repo: copr:copr.fedorainfracloud.org:atim:starship
          packages:
            - starship
        #- cbonsai
        - sudo-rs
        - uutils-coreutils
        #- byobu
        #- micro
        - baobab
        - qdirstat

        - cachyos-settings
        - scx-scheds
        - scx-tools

        #- rclone
        - ShellCheck
        - surge
        #- termflix
        #- tealdeer
        - repo: copr:copr.fedorainfracloud.org:lilay:tealdeer
          packages:
            - tealdeer
        #this is a vivaldi dependency and needs to be installed explicitly because vivaldi is only allowed to install from the vivaldi repository
        - liberation-fonts
        - repo: vivaldi
          packages:
            - vivaldi-stable
        - codium
        - repo: google-chrome
          packages:
            - google-chrome-stable
        #user-space driver support for coolercontrol
        - lm_sensors
        - repo: copr:copr.fedorainfracloud.org:codifryed:CoolerControl
          packages:
            - coolercontrol
        - audacity
        - gnome-calculator
        - haruna
        - flatseal
        - inkscape
        - gimp
        - deskflow
        - gnome-font-viewer
        - meld
        - okular
        - tailscale
        - eog
        - ptyxis
        - cifs-utils

        - fcitx5
        - fcitx5-configtool
        - fcitx5-gtk
        - fcitx5-qt
        - fcitx5-hangul
        - fcitx5-mozc

        - mission-center
        - fresh

        #flutter dependencies
        - clang
        - cmake
        - ninja-build
        - gtk3-devel
        - egl-utils

        #warp repos are still being installed, in case I change my mind about warp
        #- warp-terminal

        - android-tools

        - snapd

        - lutris
        - heroic-games-launcher

        #- nix //make nix work for fedora atomic


    remove:
      auto-remove: true
      packages:
        - zram-generator-defaults
        - gnome-system-monitor
        #- google-noto-color-emoji-fonts

  - type: script
    scripts:
      - fix-dnf-conflicts-for-steam.sh
      - setup-snapd.sh

  - type: systemd
    system:
      enabled:
        - snapd.service
        - coolercontrold.service

  - type: dnf
    repos:
      cleanup: true
      nonfree: rpmfusion
    install:
      packages:
        - steam
        - mangohud
        - gamescope
        - steam-devices

  - type: fonts
    fonts:
      nerd-fonts:
        - JetBrainsMono
      google-fonts:
        - Noto Color Emoji
        - Noto Sans Korean
        - Noto Serif Korean
        - Noto Sans Japanese
        - Noto Serif Japanese
      url-fonts:
        - name: NotoColorEmoji
          url: https://github.com/googlefonts/noto-emoji/raw/main/fonts/NotoColorEmoji.ttf
        - name: Maple-Mono-NF
          url: https://github.com/subframe7536/maple-font/releases/latest/download/MapleMono-NF-unhinted.zip

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        repo:
          name: flathub
          title: Flathub
        install:
          - io.github.kolunmi.Bazaar
          - io.github.flattool.Warehouse
          - com.ranfdev.DistroShelf
          - org.telegram.desktop
          - io.podman_desktop.PodmanDesktop
          - it.mijorus.gearlever
          - org.gnome.gitlab.somas.Apostrophe
          - com.discordapp.Discord
      - notify: false
        scope: user
        repo:
          name: flathub
          title: Flathub
        install:
          - app.zen_browser.zen
          - org.jellyfin.JellyfinDesktop
          - org.freecad.FreeCAD
          - com.bambulab.BambuStudio
          - org.onlyoffice.desktopeditors
          - md.obsidian.Obsidian
          - me.amankhanna.opendeck
          - org.zulip.Zulip
          - com.github.jeromerobert.pdfarranger
      - notify: false
        scope: user
        repo:
          name: cosmic
          title: COSMIC
          url: https://apt.pop-os.org/cosmic/cosmic.flatpakrepo
        install:
          - io.github.cosmic_utils.minimon-applet

  - type: script
    scripts:
      - adios-ioscheduler.sh
      - install-theme.sh
      - install-gamescope-helpers.sh

      #this just removes a couple of .desktop files, but I want to keep them
      #- cleanup.sh

  #index.theme seems to be overridden by something above, let's copy it again
  - type: files
    files:
      - source: system/usr/share/icons/default
        destination: /usr/share/icons/default/
