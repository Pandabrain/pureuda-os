type: dnf
repos:
  cleanup: true 
  files:
    - https://repo.vivaldi.com/archive/vivaldi-fedora.repo
    - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
  keys:
    - https://repo.vivaldi.com/archive/linux_signing_key.pub
    - https://gitlab.com/paulcarroty/vscodium-deb-rpm-repo/raw/master/pub.gpg
    - https://dl.google.com/linux/linux_signing_key.pub

install:
  packages:
    - codium
    - vivaldi-stable
    - google-chrome-stable
    - audacity
    - gnome-calculator
    - haruna
    - flatseal
    - inkscape
    - gimp
    - deskflow
    - gnome-calculator
    - gnome-font-viewer
    - meld
    - okular

      #from terra
    - terra-release
    - discord
    - mission-center
    - coolercontrol

    #flutter dependencies
    - clang
    - cmake
    - ninja-build
    - gtk3-devel
    - egl-utils