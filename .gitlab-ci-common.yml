# --- Reusable Setup Logic ---
.setup_env: &setup_env
  - echo "Waiting for Docker daemon..."
  - until docker info > /dev/null 2>&1; do sleep 1; done
  - |
    if [ -f .secure_files/cosign.key ]; then
      export COSIGN_PRIVATE_KEY=$(cat .secure_files/cosign.key)
    else
      echo "Warning: .secure_files/cosign.key not found."
    fi
  - echo "Logging in to $CI_REGISTRY..."
  - echo $CI_REGISTRY_PASSWORD | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin

# --- Reusable crane install steps ---
.install-crane:
  script:
    - curl -fsSL -o /tmp/crane.tgz https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz
    - tar -xzf /tmp/crane.tgz -C /tmp crane
    - install -m 0755 /tmp/crane /usr/local/bin/crane

.bluebuild-job-template:
  interruptible: true
  image:
    name: ghcr.io/blue-build/cli
    entrypoint: [""]
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: /certs
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: $DOCKER_TLS_CERTDIR/client
  before_script:
    - *setup_env

# --- Reusable ISO build/upload job (Tag/Release/Schedule Only) ---
.iso-job-template:
  extends: .bluebuild-job-template
  stage: iso
  rules:
    # Build ISO when pushing a Git tag (e.g., v2026.03) or on a special schedule
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "schedule" && $BUILD_ISO == "true"
  before_script:
    - !reference [.bluebuild-job-template, before_script]
  script:
    # 1. Parse the Version or handle Schedule
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        echo "Pipeline triggered by Git tag $CI_COMMIT_TAG"
        export RELEASE_VERSION="${CI_COMMIT_TAG#v}"
      elif [ "$CI_PIPELINE_SOURCE" == "schedule" ]; then
        echo "Pipeline triggered by schedule"
        export RELEASE_VERSION="$(date +%Y.%m.%d)-schedule"
      fi
    - export RELEASE_ISO="${ISO_NAME%.iso}-${RELEASE_VERSION}.iso"
    - echo "Building release ISO $RELEASE_ISO..."

    # 2. Build ISO directly with the versioned name
    - bluebuild generate-iso --secure-boot-url "$CI_PROJECT_URL/-/raw/$CI_COMMIT_REF_NAME/MOK.der" --enrollment-password bluebuild --iso-name $RELEASE_ISO image $IMAGE_NAME

    # 3. Generate SHA256
    - sha256sum $RELEASE_ISO | tee $RELEASE_ISO.sha256

  artifacts:
    name: "pureuda-os-iso-$RELEASE_VERSION"
    when: always
    expire_in: 2 years
    paths:
      - "*.iso"
      - "*.sha256"
