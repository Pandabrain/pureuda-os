"$schema" = 'https://starship.rs/config-schema.json'

format = """
$battery\
[](section1)\
$os\
$shell\
$shlvl\
$username\
$sudo\
$hostname\
[](bg:peach fg:red)\
$directory\
$direnv\
[](bg:yellow fg:peach)\
$git_branch\
$git_commit\
$git_status\
$git_metrics\
$hg_branch\
$hg_state\
pijul_channel\
[](fg:yellow bg:green)\
$c\
$cobol\
$cpp\
$crystal\
$daml\
$dart\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$gleam\
$golang\
$haskell\
$haxe\
$java\
$julia\
$kotlin\
$mojo\
$nim\
$lua\
$nodejs\
$ocaml\
$odin\
$perl\
$php\
$purescript\
$python\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$solidity\
$swift\
$vlang\
$zig\
[](fg:green bg:sapphire)\
$aws\
$azure\
$buf\
$bun\
$cmake\
$conda\
$container\
$deno\
$docker_context\
$fortran\
$fossil_branch\
$fossil_metrics\
$gcloud\
$guix_shell\
$gradle\
$helm\
$kubernetes\
$meson\
$mise\
$nats\
$netns\
$nix_shell\
$opa\
$openstack\
$package\
$pixi\
$pulumi\
$quarto\
$singularity\
$spack\
$terraform\
$typst\
$vagrant\
$vcsh\
$xmake\
[](fg:sapphire bg:lavender)\
$time\
[ ](fg:lavender)\
$jobs\
$memory_usage\
$localip\
$cmd_duration\
$line_break\
$status\
$character"""

palette = 'pureuda_os'

[os]
disabled = false
style = "bg:section1 fg:crust"

[os.symbols]
Windows = ""
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[status]
disabled = false
format = '[\[$status\]]($style)'

[shell]
unknown_indicator = 'unkown shell'
format = '[ $indicator]($style)'
style = 'bg:section2 fg:crust'
disabled = false

[shlvl]
disabled = false
style = 'bg:section2 fg:crust'

[hostname]
style = 'bg:red fg:crust'

[sudo]
disabled = false
style = 'bg:red fg:crust'
symbol = ''
format = '[$symbol]($style)'

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[direnv]
disabled = false
style = "bg:peach fg:crust"

[battery]
full_symbol = " "
charging_symbol = "󱐋 "
discharging_symbol = " "
empty_symbol = " "

[[battery.display]]
threshold = 100
style = "bold red"

[git_branch]
symbol = ""
style = "bg:yellow fg:crust"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow fg:crust"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[git_metrics]
added_style = "bg:yellow fg:crust"
deleted_style = "bg:yellow fg:crust"
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
disabled = false

[hg_branch]
style = "bg:yellow fg:crust"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'
symbol = ""

[hg_state]
style = "bg:yellow fg:crust"
format = '[[($state( $progress_current/$progress_total))](fg:crust bg:yellow)]($style)'

[pijul_channel]
style = "bg:yellow fg:crust"
format = '[[ $symbol $channel ](fg:crust bg:yellow)]($style)'
symbol = ""

[nodejs]
symbol = ""
style = "bg:green fg:crust"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[c]
symbol = " "
style = "bg:green fg:crust"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[cobol]
symbol = "⚙ "
