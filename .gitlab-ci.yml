stages:
  - triggers
default:
  interruptible: true
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: "$CI_COMMIT_BRANCH"
    - if: "$CI_COMMIT_TAG"

# --- Trigger Base Pipeline ---
trigger-base-image-build:
  stage: triggers
  trigger:
    include: .gitlab-ci-base.yml
    strategy: depend
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - changes:
        - recipes/base.yml
        - recipes/core.yml
        - .gitlab-ci-base.yml
        - .gitlab-ci.yml
        - "files/**/*"
        - "modules/**/*"
