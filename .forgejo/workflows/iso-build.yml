name: ISO Build
on:
  schedule:
    - cron: "0 0 1 */3 *"
  workflow_dispatch:

jobs:
  build-iso:
    name: Build ISO
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Cosign
        run: |
          COSIGN_VERSION=$(curl -s https://api.github.com/repos/sigstore/cosign/releases/latest | jq -r .tag_name)
          curl -L "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" -o cosign
          chmod +x cosign
          mv cosign /usr/bin/cosign

      - name: Determine Vars
        id: build_vars
        run: |
          set -euo pipefail
          CLI_VERSION_TAG="v0.9"
          echo "cli_version=${CLI_VERSION_TAG}" >> "${GITHUB_OUTPUT}"
          
          TIMESTAMP=$(date +%Y%m%d)
          echo "timestamp=${TIMESTAMP}" >> "${GITHUB_OUTPUT}"

      - name: Install BlueBuild
        env:
          CLI_VERSION_TAG: ${{ steps.build_vars.outputs.cli_version }}
        run: |
          set -euo pipefail
          CLI_INSTALLER_IMAGE="ghcr.io/blue-build/cli:${CLI_VERSION_TAG}-installer"
          docker pull "${CLI_INSTALLER_IMAGE}"
          docker create --name blue-build-installer "${CLI_INSTALLER_IMAGE}"
          docker cp blue-build-installer:/out/bluebuild ./bluebuild
          mv ./bluebuild /usr/bin/bluebuild
          docker rm blue-build-installer
          bluebuild --version

      - name: Create MOK private key file
        run: |
          mkdir -p .secure_files
          echo "${{ secrets.MOK_PRIVATE_KEY }}" > .secure_files/MOK.priv
          chmod 600 .secure_files/MOK.priv

      - name: Build ISO
        id: build
        run: |
          mkdir -p ./output
          bluebuild generate-iso image forgejo.pandabrain.com/pandabrain/pureuda-os:latest \
            --output-dir ./output \
            --iso-name "pureuda-os-${{ steps.build_vars.outputs.timestamp }}.iso"
          
          ISO_PATH=$(find ./output -name "*.iso" | head -n 1)
          if [ -z "${ISO_PATH}" ]; then
            echo "Error: ISO not found in output directory"
            exit 1
          fi
          echo "iso_path=${ISO_PATH}" >> "${GITHUB_OUTPUT}"
          echo "iso_name=$(basename ${ISO_PATH})" >> "${GITHUB_OUTPUT}"

      - name: Create Release
        id: create_release
        uses: actions/forgejo-release@v2
        with:
          tag_name: iso-${{ steps.build_vars.outputs.timestamp }}
          name: ISO Release ${{ steps.build_vars.outputs.timestamp }}
          body: |
            Quarterly ISO build for Pureuda OS.
            Built on ${{ steps.build_vars.outputs.timestamp }}.
          draft: false
          prerelease: false
          files: |
            ${{ steps.build.outputs.iso_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
