name: ISO Build
on:
  schedule:
    - cron: "0 0 1 */3 *"
  workflow_dispatch:

jobs:
  build-iso:
    name: Build ISO
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate build variables
        id: build_vars
        run: echo "timestamp=$(date +%Y%m%d%H%M%S)" >> "${GITHUB_OUTPUT}"

      - name: Install BlueBuild
        run: |
          set -euo pipefail
          CLI_INSTALLER_IMAGE="ghcr.io/blue-build/cli:latest-installer"
          CONTAINER_NAME="blue-build-installer-isobuilder"
          docker pull "${CLI_INSTALLER_IMAGE}"
          docker create --name "${CONTAINER_NAME}" "${CLI_INSTALLER_IMAGE}"
          docker cp "${CONTAINER_NAME}":/out/bluebuild ./bluebuild
          mv ./bluebuild /usr/bin/bluebuild
          docker rm "${CONTAINER_NAME}"
          bluebuild --version

      - name: Build ISO
        id: build
        run: |
          # Define a temporary working area that isn't restricted
          BUILD_DIR="/tmp/bluebuild-workspace"
          mkdir -p "${BUILD_DIR}/output"
          
          # Run bluebuild pointing to the temp directory
          # We use --output-dir with the full temp path
          bluebuild generate-iso \
            -v \
            --output-dir "${BUILD_DIR}/output" \
            --iso-name "pureuda-os-${{ steps.build_vars.outputs.timestamp }}.iso" \
            image forgejo.pandabrain.com/pandabrain/pureuda-os:latest
          
          # Move the finished ISO back to your workspace so the Release step can find it
          mkdir -p "${GITHUB_WORKSPACE}/output"
          
          # Try to find the ISO in the expected output-dir or in a build/ directory in CWD
          # Some versions of bluebuild or its sub-tools might default to 'build/'
          FOUND_ISO=$(find "${BUILD_DIR}/output" "${GITHUB_WORKSPACE}" -name "*.iso" | head -n 1)
          
          if [ -z "${FOUND_ISO}" ]; then
            echo "Error: Could not find any .iso file after build!"
            exit 1
          fi
          
          cp "${FOUND_ISO}" "${GITHUB_WORKSPACE}/output/"
          
          ISO_PATH=$(find "${GITHUB_WORKSPACE}/output" -name "*.iso" | head -n 1)
          echo "iso_path=${ISO_PATH}" >> "${GITHUB_OUTPUT}"
          echo "iso_name=$(basename ${ISO_PATH})" >> "${GITHUB_OUTPUT}"

      - name: Create Release
        id: create_release
        uses: actions/forgejo-release@v2
        with:
          tag_name: iso-${{ steps.build_vars.outputs.timestamp }}
          name: ISO Release ${{ steps.build_vars.outputs.timestamp }}
          body: |
            Quarterly ISO build for Pureuda OS.
            Built on ${{ steps.build_vars.outputs.timestamp }}.
          draft: false
          prerelease: false
          files: |
            ${{ steps.build.outputs.iso_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
