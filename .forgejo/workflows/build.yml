name: bluebuild
concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.ref_name}}
  cancel-in-progress: true
on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "40 16 * * *"
  #push:
    #branches:
    #  - main
    #  - test
    #paths-ignore:
    #  - "**.md"
  workflow_dispatch:

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: docker
    container:
      image: ghcr.io/blue-build/cli:latest
      #options: --user root #-v /var/run/docker.sock:/var/run/docker.sock
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - base.yml
    steps:
      - name: Install node
        run: |
          dnf install -y nodejs

      - name: Checkout repository
        uses: actions/checkout@v6

      #if nodejs installation or the checkout action should fail, you can simply replace the installation of nodejs and the checkout action above
      # and just run git commands manually like so:
      #      - name: Checkout repository
      #        run: |
      #          git clone ${{ github.server_url }}/${{ github.repository }} .
      #          git checkout ${{ github.sha }}

      #this is only used by my custom kernel module for signing the kernel to allow secure boot
      # (this simply replicates what the origami linux project does on gitlab. doing it this way means, that the build
      # still works with their gitlab pipeline and my forgejo pipeline at the same time without having to change the project itself)
      - name: Create MOK private key file
        run: |
          mkdir -p .secure_files
          echo "${{ secrets.MOK_PRIVATE_KEY }}" > .secure_files/MOK.priv
          chmod 600 .secure_files/MOK.priv

      - name: Log Forgejo context
        run: |
          echo "Forgejo context:"
          echo "${{ toJSON(forgejo) }}"

      - name: Build Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          BB_BUILD_PUSH: "true"
          BB_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_TOKEN }}
          BB_USERNAME: ${{ forgejo.repository_owner }}
          BB_REGISTRY: ${{ secrets.CONTAINER_REGISTRY }}
          BB_REGISTRY_NAMESPACE: ${{ forgejo.repository_owner }}
          RECIPE_PATH: ./recipes/${{ matrix.recipe }}
          RUST_LOG_STYLE: always
          CLICOLOR_FORCE: "1"
          GITHUB_REPOSITORY: ${{ forgejo.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ forgejo.repository_owner }}
          GITHUB_EVENT_PATH_ORIG: ${{ github.event_path }}
        run: |
          # bluebuild expects a repository field in the event JSON, which is missing on scheduled runs.
          # We manually construct a minimal event JSON to satisfy the bluebuild CLI.
          # We use a temporary file and set GITHUB_EVENT_PATH to point to it.
          if [ -n "$GITHUB_EVENT_PATH_ORIG" ] && [ -f "$GITHUB_EVENT_PATH_ORIG" ]; then
            cat "$GITHUB_EVENT_PATH_ORIG" > /tmp/event.json
          else
            echo "{}" > /tmp/event.json
          fi

          # If the repository field is missing, add it.
          if ! grep -q '"repository":' /tmp/event.json; then
            # Construct a minimal repository object.
            # We use the forgejo context to get the owner and name.
            
            # Using jq to safely inject the repository object if available, but since we're in a container, 
            # let's use a simpler method if jq isn't guaranteed (though we installed node earlier).
            # Actually, the container ghcr.io/blue-build/cli:latest might not have jq.
            # Let's use node to do the JSON manipulation since it was installed in a previous step.
            
            node -e "
              const fs = require('fs');
              let event = {};
              try {
                event = JSON.parse(fs.readFileSync('/tmp/event.json', 'utf8'));
              } catch (e) {}
              if (!event.repository) {
                event.repository = {
                  
                  owner: {
                    login: '${{ forgejo.repository_owner }}'
                  }, 
                  html_url: '${{ forgejo.server_url }}/${{ forgejo.repository}}',
                  default_branch: 'main'
                };
              }
              fs.writeFileSync('/tmp/event.json', JSON.stringify(event, null, 2));
            "
          fi
          
          # We export GITHUB_EVENT_PATH for the bluebuild CLI
          export GITHUB_EVENT_PATH=/tmp/event.json
          bluebuild build -v "${RECIPE_PATH}"
