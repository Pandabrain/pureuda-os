name: bluebuild
on:
  schedule:
    - cron: "00 06 * * *"
  push:
    branches:
      - main
      - test
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/blue-build/cli:v0.9
    strategy:
      fail-fast: false
    matrix:
      recipe:
        - base.yml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Determine Vars
        id: build_vars
        run: |
          set -euo pipefail
          RECIPE="${{ matrix.recipe }}"
          if [ -f "./config/${RECIPE}" ]; then
            RECIPE_PATH="./config/${RECIPE}"
          else
            RECIPE_PATH="./recipes/${RECIPE}"
          fi
          echo "recipe_path=${RECIPE_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Create MOK private key file
        run: |
          mkdir -p .secure_files
          echo "${{ secrets.MOK_PRIVATE_KEY }}" > .secure_files/MOK.priv
          chmod 600 .secure_files/MOK.priv

      - name: Build Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          BB_BUILD_PUSH: "true"
          BB_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_TOKEN }}
          BB_USERNAME: ${{ github.actor }}
          BB_REGISTRY: ${{ secrets.CONTAINER_REGISTRY }}
          BB_REGISTRY_NAMESPACE: ${{ github.repository_owner }}
          GH_PR_EVENT_NUMBER: ${{ github.event.number }}
          RECIPE_PATH: ${{ steps.build_vars.outputs.recipe_path }}
          RUST_LOG_STYLE: always
          CLICOLOR_FORCE: "1"
        run: |
          #echo "${{ github.token }}" | docker login ${{ secrets.CONTAINER_REGISTRY }} -u ${{ github.actor }} --password-stdin
          bluebuild build -v "${RECIPE_PATH}"

