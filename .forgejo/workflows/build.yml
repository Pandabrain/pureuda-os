name: bluebuild
on:
  schedule:
    - cron: "00 06 * * *"
  push:
    branches:
      - main
      - test
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - base.yml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0
        with:
          install-dir: /usr/bin
          use-sudo: true

      - name: Install BlueBuild
        run: |
          set -euo pipefail
          CLI_INSTALLER_IMAGE="https://ghcr.io/blue-build/cli:latest-installer"
          docker pull "${CLI_INSTALLER_IMAGE}"
          docker create --name blue-build-installer "${CLI_INSTALLER_IMAGE}"
          docker cp blue-build-installer:/out/bluebuild ./bluebuild
          mv ./bluebuild /usr/bin/bluebuild
          docker rm blue-build-installer
          bluebuild --version

      - name: Create MOK private key file
        run: |
          mkdir -p .secure_files
          echo "${{ secrets.MOK_PRIVATE_KEY }}" > .secure_files/MOK.priv
          chmod 600 .secure_files/MOK.priv

      - name: Build Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          BB_BUILD_PUSH: "true"
          BB_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_TOKEN }}
          BB_USERNAME: ${{ github.actor }}
          BB_REGISTRY: ${{ secrets.CONTAINER_REGISTRY }}
          BB_REGISTRY_NAMESPACE: ${{ github.repository_owner }}
          GH_PR_EVENT_NUMBER: ${{ github.event.number }}
          RECIPE_PATH: ./recipes/${{ matrix.recipe }}
          RUST_LOG_STYLE: always
          CLICOLOR_FORCE: "1"
        run: |
          bluebuild build -v "${RECIPE_PATH}"

