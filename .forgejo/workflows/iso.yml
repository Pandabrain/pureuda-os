name: ISO Generation
on:
  #schedule:
  #  - cron: "0 0 1 */3 *" # Every 3 months
  workflow_dispatch:

jobs:
  generate-iso:
    name: Generate ISO
    runs-on: docker
    container:
      image: ghcr.io/blue-build/cli:latest
    steps:
      - name: Install node
        run: |
          dnf install -y nodejs

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set Release Name
        run: |
          echo "RELEASE_TAG=$(date +%Y.%m.%d-%H%M)" >> $GITHUB_ENV

      - name: Create MOK private key file
        run: |
          mkdir -p .secure_files
          echo "${{ secrets.MOK_PRIVATE_KEY }}" > .secure_files/MOK.priv
          chmod 600 .secure_files/MOK.priv

      - name: Generate ISO
        run: |
          bluebuild generate-iso \
            --secure-boot-url https://forgejo.pandabrain.com/pandabrain/pureuda-os/raw/branch/main/MOK.der \
            --enrollment-password bluebuild \
            --iso-name pureuda-os-${{ env.RELEASE_TAG }}.iso \
            image forgejo.pandabrain.com/pandabrain/pureuda-os:latest

      - name: Create Release
        id: create_release
        uses: https://github.com/actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          release_name: Release ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: false

      - name: Upload ISO to Release
        uses: https://github.com/actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./pureuda-os-${{ env.RELEASE_TAG }}.iso
          asset_name: pureuda-os-${{ env.RELEASE_TAG }}.iso
          asset_content_type: application/x-iso9660

      - name: Upload Checksum to Release
        uses: https://github.com/actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./pureuda-os-${{ env.RELEASE_TAG }}.iso-CHECKSUM
          asset_name: pureuda-os-${{ env.RELEASE_TAG }}.iso-CHECKSUM
          asset_content_type: text/plain
