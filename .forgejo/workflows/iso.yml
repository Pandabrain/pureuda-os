name: ISO Generation
on:
  #schedule:
  #  - cron: "0 0 1 */3 *" # Every 3 months
  workflow_dispatch:

jobs:
  generate-iso:
    name: Generate ISO
    runs-on: docker
    container:
      image: ghcr.io/blue-build/cli:latest
    steps:
      - name: Install dependencies
        run: |
          dnf install -y nodejs jq

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set Release Name
        run: |
          echo "RELEASE_TAG=$(date +%Y.%m.%d-%H%M)" >> $GITHUB_ENV

      - name: Create MOK private key file
        run: |
          mkdir -p .secure_files
          echo "${{ secrets.MOK_PRIVATE_KEY }}" > .secure_files/MOK.priv
          chmod 600 .secure_files/MOK.priv

      #- name: Generate ISO
      #  run: |
      #    bluebuild generate-iso \
      #      --secure-boot-url https://forgejo.pandabrain.com/pandabrain/pureuda-os/raw/branch/main/MOK.der \
      #      --enrollment-password bluebuild \
      #      --iso-name pureuda-os-${{ env.RELEASE_TAG }}.iso \
      #      image forgejo.pandabrain.com/pandabrain/pureuda-os:latest

      - name: Create Forgejo Release
        uses: https://code.forgejo.org/actions/forgejo-release@v1
        with:
          direction: upload
          release-dir: .
          release-notes: "Release ${{ env.RELEASE_TAG }}"
          tag-name: ${{ env.RELEASE_TAG }}
          files: |
            pureuda-os-2026.03.17-1924.iso
            pureuda-os-2026.03.17-1924.iso-CHECKSUM
      #      pureuda-os-${{ env.RELEASE_TAG }}.iso
      #      pureuda-os-${{ env.RELEASE_TAG }}.iso-CHECKSUM