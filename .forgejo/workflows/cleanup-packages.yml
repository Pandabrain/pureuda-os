name: Cleanup Packages
on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: docker
    steps:
#      - name: Install dependencies
#        run: |
#          dnf install -y jq curl

      - name: Cleanup old packages
        run: |
          # Forgejo API base URL
          API_URL="${{ github.api_url }}"
          # Repository identifier: owner/repo
          REPO="${{ github.repository }}"
          # Authentication token
          TOKEN="${{ secrets.CONTAINER_REGISTRY_TOKEN }}"

          echo "Checking packages for ${REPO} at ${API_URL}..."

          # List packages for this repository
          # Note: Forgejo API for packages: /api/v1/repos/{owner}/{repo}/packages
          # We need to filter by package type if necessary, but here we assume container packages.
          
          PACKAGES=$(curl -s -H "Authorization: token ${TOKEN}" "${API_URL}/repos/${REPO}/packages?type=container")
          
          # Filter packages: only those that actually belong to the container registry and are versions of the image
          # Forgejo API returns a list of packages. We should make sure we're looking at the right ones.
          
          COUNT=$(echo "${PACKAGES}" | jq '. | length')
          echo "Found ${COUNT} package versions."

          if [ "${COUNT}" -gt 5 ]; then
            echo "More than 5 packages found. Checking for packages older than 5 days..."
            
            # Current date in seconds
            NOW=$(date +%s)
            # 5 days in seconds
            LIMIT=$((5 * 24 * 60 * 60))
            
            # Iterate through packages and delete those older than 5 days
            echo "${PACKAGES}" | jq -c '.[]' | while read -r pkg; do
              CREATED_AT=$(echo "${pkg}" | jq -r '.created_at')
              PKG_NAME=$(echo "${pkg}" | jq -r '.name')
              PKG_VERSION=$(echo "${pkg}" | jq -r '.version.version')
              
              # Convert ISO 8601 date to seconds
              CREATED_SEC=$(date -d "${CREATED_AT}" +%s)
              AGE=$((NOW - CREATED_SEC))
              
              if [ "${AGE}" -gt "${LIMIT}" ]; then
                echo "Deleting package version ${PKG_NAME}:${PKG_VERSION} - Created at ${CREATED_AT}"
                # Delete the package version
                # Forgejo API: DELETE /api/v1/packages/{owner}/{type}/{name}/{version}
                
                OWNER=$(echo "${REPO}" | cut -d'/' -f1)
                curl -s -X DELETE -H "Authorization: token ${TOKEN}" "${API_URL}/packages/${OWNER}/container/${PKG_NAME}/${PKG_VERSION}"
              fi
            done
          else
            echo "${COUNT} package versions found. No cleanup needed."
          fi
