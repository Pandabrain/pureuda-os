name: Cleanup Packages
on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: docker
    steps:
      - name: Cleanup old packages
        run: |
          # Use Node.js for JSON processing as jq is not available
          node << 'EOF'
          const https = require('https');
          const { execSync } = require('child_process');

          const apiUrl = "${{ github.api_url }}";
          const repo = "${{ github.repository }}";
          const token = "${{ secrets.CONTAINER_REGISTRY_TOKEN }}";
          const owner = repo.split('/')[0];
          const limit = 5 * 24 * 60 * 60 * 1000; // 5 days in ms
          const now = Date.now();

          async function request(url, method = 'GET') {
            const options = {
              method,
              headers: {
                'Authorization': `token ${token}`,
                'User-Agent': 'node.js'
              }
            };
            return new Promise((resolve, reject) => {
              const req = https.request(url, options, (res) => {
                let data = '';
                res.on('data', (chunk) => data += chunk);
                res.on('end', () => resolve({ statusCode: res.statusCode, body: data }));
              });
              req.on('error', reject);
              req.end();
            });
          }

          async function run() {
            console.log(`Checking packages for ${repo} at ${apiUrl}...`);
            
            // Search for packages by owner and name
            const searchUrl = `${apiUrl}/packages/${owner}?type=container&q=${repo.split('/')[1]}`;
            const { statusCode: searchStatus, body: searchBody } = await request(searchUrl);

            if (searchStatus !== 200) {
              console.error(`Error searching packages: ${searchStatus} ${searchBody}`);
              process.exit(1);
            }

            const searchResults = JSON.parse(searchBody);
            // Forgejo's /packages/{owner} returns an array of packages
            // Find the one that matches our repo name (the package name)
            const pkgInfo = searchResults.find(p => p.name === repo.split('/')[1]);

            if (!pkgInfo) {
              console.log(`No container package found for ${repo}.`);
              return;
            }

            // Get versions for this specific package
            const versionsUrl = `${apiUrl}/packages/${owner}/container/${pkgInfo.name}`;
            const { statusCode, body } = await request(versionsUrl);

            if (statusCode !== 200) {
              console.error(`Error fetching package versions: ${statusCode} ${body}`);
              process.exit(1);
            }

            const packages = JSON.parse(body);
            const count = packages.length;
            console.log(`Found ${count} package versions.`);

            if (count > 5) {
              console.log("More than 5 packages found. Checking for packages older than 5 days...");
              
              for (const pkg of packages) {
                const createdAt = new Date(pkg.created_at).getTime();
                const age = now - createdAt;
                const pkgName = pkgInfo.name; // Use pkgInfo.name from search result
                const pkgVersion = pkg.version.version;

                if (age > limit) {
                  console.log(`Deleting package version ${pkgName}:${pkgVersion} - Created at ${pkg.created_at}`);
                  const deleteUrl = `${apiUrl}/packages/${owner}/container/${pkgName}/${pkgVersion}`;
                  const { statusCode: delStatus } = await request(deleteUrl, 'DELETE');
                  if (delStatus === 204 || delStatus === 200) {
                    console.log(`Successfully deleted ${pkgName}:${pkgVersion}`);
                  } else {
                    console.error(`Failed to delete ${pkgName}:${pkgVersion}: ${delStatus}`);
                  }
                }
              }
            } else {
              console.log(`${count} package versions found. No cleanup needed.`);
            }
          }

          run().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF
