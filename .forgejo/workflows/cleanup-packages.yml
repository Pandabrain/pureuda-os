name: Cleanup Packages
on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          # Try to install jq and curl if not available
          if ! command -v jq &> /dev/null; then
            if command -v apt-get &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y jq curl || apt-get update && apt-get install -y jq curl
            elif command -v apk &> /dev/null; then
              apk add --no-cache jq curl
            elif command -v dnf &> /dev/null; then
              dnf install -y jq curl
            fi
          fi

      - name: Delete old package versions
        shell: bash
        env:
          # Use the secret that was confirmed working in previous attempts
          TOKEN: ${{ secrets.CONTAINER_REGISTRY_TOKEN }} 
          API_URL: "${{ github.api_url }}"
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.repository }}
        run: |
          # 1. Get all packages for this repository
          # Note: Forgejo API for listing packages for a user/org
          # If we don't have the repository_id, we'll filter by name later
          # Using github.repository as owner/repo name
          REPO_NAME_ONLY="${REPO_NAME#*/}"
          
          echo "Using API_URL: $API_URL"
          echo "Fetching packages for owner: $REPO_OWNER and repository: $REPO_NAME_ONLY"
          PACKAGES_URL="$API_URL/packages/$REPO_OWNER?type=container&q=$REPO_NAME_ONLY"
          echo "Requesting: $PACKAGES_URL"
          RAW_PACKAGES=$(curl -v -s -H "Authorization: token $TOKEN" "$PACKAGES_URL" 2>&1)
          CURL_EXIT=$?
          
          # Extract only the body if it's JSON (or everything if not)
          # We'll use this for debugging if jq fails
          echo "Full API response (including headers for debugging):"
          echo "$RAW_PACKAGES"
          
          # Try to extract the JSON body (assuming it's after the headers)
          # In verbose mode, curl sends headers to stderr, so they should be in RAW_PACKAGES
          # Let's try to get just the JSON body for jq
          PACKAGES=$(curl -s -f -H "Authorization: token $TOKEN" "$PACKAGES_URL")
          CURL_EXIT=$?
          
          if [ $CURL_EXIT -ne 0 ]; then
            echo "Curl failed with exit code $CURL_EXIT"
            exit $CURL_EXIT
          fi

          if [ -z "$PACKAGES" ] || [ "$PACKAGES" == "[]" ]; then
            echo "No container packages found for this repository."
            exit 0
          fi

          for row in $(echo "${PACKAGES}" | jq -r '.[] | @base64'); do
            _jq() { echo ${row} | base64 --decode | jq -r ${1}; }
            PKG_NAME=$(_jq '.name')
            PKG_TYPE=$(_jq '.type')

            # Double check name match
            if [ "$PKG_NAME" != "$REPO_NAME_ONLY" ]; then
              continue
            fi

            echo "Checking package: $PKG_NAME ($PKG_TYPE)"

            # 2. Get all versions for this specific package
            # Forgejo returns versions in reverse chronological order (newest first) by default
            # But let's sort them ourselves to be 100% sure we keep the right ones
            VERSIONS_URL="$API_URL/packages/$REPO_OWNER/$PKG_TYPE/$PKG_NAME/versions"
            echo "Requesting versions: $VERSIONS_URL"
            RAW_VERSIONS=$(curl -v -s -H "Authorization: token $TOKEN" "$VERSIONS_URL" 2>&1)
            echo "Full API response (versions):"
            echo "$RAW_VERSIONS"
            
            VERSIONS=$(curl -s -f -H "Authorization: token $TOKEN" "$VERSIONS_URL")
            CURL_EXIT=$?
            if [ $CURL_EXIT -ne 0 ]; then
              echo "Curl (versions) failed with exit code $CURL_EXIT"
              exit $CURL_EXIT
            fi
            
            # Sort by created_at descending and keep all but the first 5
            DELETE_LIST=$(echo "$VERSIONS" | jq -c "sort_by(.created_at) | reverse | .[5:] | .[]")
            COUNT=$(echo "$VERSIONS" | jq '. | length')

            if [ "$COUNT" -gt 5 ] && [ -n "$DELETE_LIST" ]; then
              echo "Found $COUNT versions. Evaluating for deletion..."
              
              for v_row in $(echo "${DELETE_LIST}" | jq -r '. | @base64'); do
                _vjq() { echo ${v_row} | base64 --decode | jq -r ${1}; }
                V_ID=$(_vjq '.id')
                V_NAME=$(_vjq '.version')
                V_DATE=$(_vjq '.created_at')

                # Convert date to seconds for comparison
                # Note: Forgejo uses 'created_at' for versions
                # Handle potential date format issues with 'date -d'
                CREATED_TS=$(date -d "$V_DATE" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%S%z" "$V_DATE" +%s 2>/dev/null)
                THRESHOLD_TS=$(date -d "5 days ago" +%s)

                if [ "$CREATED_TS" -lt "$THRESHOLD_TS" ]; then
                  echo "Deleting version $V_NAME (ID: $V_ID) - Created at $V_DATE (Older than 5 days)."
                  DELETE_URL="$API_URL/packages/$REPO_OWNER/$PKG_TYPE/$PKG_NAME/versions/$V_ID"
                  echo "Requesting deletion: $DELETE_URL"
                  curl -s -f -X DELETE -H "Authorization: token $TOKEN" "$DELETE_URL"
                else
                  echo "Keeping version $V_NAME - Not old enough yet ($V_DATE)."
                fi
              done
            else
              echo "Only $COUNT versions found or none left to delete after keeping top 5. Skipping."
            fi
          done
